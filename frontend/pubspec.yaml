name: pos_resto_frontend
description: "A Modern POS Application for Restaurants"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dio: ^5.4.1
  shared_preferences: ^2.2.2
  go_router: ^13.2.0
  intl: ^0.19.0
  image_picker: ^1.0.7
  fl_chart: ^0.66.0
  pdf: ^3.10.7
  printing: ^5.12.0
  qr_flutter: ^4.1.0
  url_launcher: ^6.2.4
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env

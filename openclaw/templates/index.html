<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Agent Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        html, body { background: #f8faff; height: 100vh; width: 100vw; overflow: hidden; position: fixed; }
        
        /* Chat Container */
        .chat-container { height: 100vh; width: 100vw; display: flex; flex-direction: column; background: white; }
        
        /* Chat Box */
        .chat-box { flex: 1; padding: 20px; padding-bottom: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; background: #f8faff; min-height: 0; }
        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 10px; }

        /* Messages */
        .message { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; position: relative; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bot-message { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #edf2f7; }
        .user-message { align-self: flex-end; background: linear-gradient(135deg, #0084ff 0%, #0066ff 100%); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(0,132,255,0.2); }

        /* Input Area */
        .chat-input { padding: 16px; background: white; border-top: 1px solid #edf2f7; display: flex; gap: 10px; align-items: center; z-index: 10; }
        .chat-input input { flex: 1; padding: 12px 18px; border: 1px solid #e2e8f0; border-radius: 25px; outline: none; transition: all 0.2s; font-size: 14px; background: #f9f9f9; }
        .chat-input input:focus { border-color: #0084ff; background: white; box-shadow: 0 0 0 3px rgba(0,132,255,0.1); }
        .chat-input button { background: #0084ff; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 14px; }
        .chat-input button:hover { background: #0066ff; transform: scale(1.02); }

        /* Modal */
        .name-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 32px; border-radius: 24px; text-align: center; width: 90%; max-width: 350px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .modal-content h3 { margin-bottom: 8px; color: #1a202c; font-size: 20px; }
        .modal-content p { color: #718096; font-size: 14px; margin-bottom: 20px; }
        .modal-content input { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 16px; outline: none; text-align: center; font-size: 15px; }
        .modal-content button { width: 100%; padding: 12px; background: #0084ff; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 15px; }

        /* Typing indicator */
        .typing-indicator { display: none; align-self: flex-start; background: white; padding: 12px 16px; border-radius: 18px; border-bottom-left-radius: 4px; border: 1px solid #edf2f7; margin-bottom: 10px; }
        .dot { height: 6px; width: 6px; background-color: #cbd5e0; border-radius: 50%; display: inline-block; margin-right: 4px; animation: bounce 1.3s infinite; }
        .dot:nth-child(2) { animation-delay: -1.1s; }
        .dot:nth-child(3) { animation-delay: -0.9s; margin-right: 0; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="chat-box" id="chat-box">
            <div class="message bot-message">Halo! Saya adalah NFM Assistant untuk POS Resto. Ada yang bisa saya bantu hari ini?</div>
        </div>
        <div class="typing-indicator" id="typing-indicator">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Ketik pesan..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Kirim</button>
        </div>
    </div>

    <!-- Modal Input Nama -->
    <div id="name-modal" class="name-modal" style="display: none;">
        <div class="modal-content">
            <h3>Selamat Datang!</h3>
            <p>Silakan masukkan nama Anda untuk memulai chat:</p>
            <input type="text" id="name-input" placeholder="Nama Anda..." onkeypress="if(event.key==='Enter') saveName()">
            <button onclick="saveName()">Mulai Chat</button>
        </div>
    </div>

    <script>
        let userName = localStorage.getItem("chat_user_name");

        window.onload = () => {
            if (!userName) {
                document.getElementById("name-modal").style.display = "flex";
            } else {
                appendMessage("bot", `Selamat datang kembali, ${userName}! Ada yang bisa saya bantu?`);
            }
        };

        function saveName() {
            const input = document.getElementById("name-input");
            const name = input.value.trim();
            if (name) {
                userName = name;
                localStorage.setItem("chat_user_name", name);
                document.getElementById("name-modal").style.display = "none";
                appendMessage("bot", `Halo ${userName}! Silakan ketik pertanyaan Anda.`);
            }
        }

        let chatToken = null;

        async function fetchToken() {
            try {
                const res = await fetch("api/chat-token");
                const data = await res.json();
                chatToken = data.token;
            } catch (e) {
                console.error("Gagal mendapatkan token:", e);
            }
        }

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const message = inputField.value.trim();
            if (!message) return;

            // Fetch token if we don't have one
            if (!chatToken) await fetchToken();

            appendMessage("user", message);
            inputField.value = "";

            // Show typing indicator
            const typingIndicator = document.getElementById("typing-indicator");
            const chatBox = document.getElementById("chat-box");
            typingIndicator.style.display = "block";
            chatBox.appendChild(typingIndicator);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch("chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        message: message,
                        user_name: userName || "Web User",
                        chat_token: chatToken || ""
                    })
                });

                if (response.status === 403) {
                    // Token expired, retry once with new token
                    await fetchToken();
                    const retryResponse = await fetch("chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ 
                            message: message,
                            user_name: userName || "Web User",
                            chat_token: chatToken || ""
                        })
                    });
                    const data = await retryResponse.json();
                    if (!retryResponse.ok) throw new Error(data.error);
                    
                    typingIndicator.style.display = "none";
                    document.body.appendChild(typingIndicator);
                    appendMessage("bot", data.reply);
                    return;
                }

                const data = await response.json();
                if (!response.ok) throw new Error(data.error);

                // Hide typing indicator
                typingIndicator.style.display = "none";
                document.body.appendChild(typingIndicator);

                appendMessage("bot", data.reply);
            } catch (error) {
                typingIndicator.style.display = "none";
                document.body.appendChild(typingIndicator);
                appendMessage("bot", error.message || "Maaf, terjadi kesalahan saat terhubung ke server.");
            }
        }

        function appendMessage(sender, text) {
            const chatBox = document.getElementById("chat-box");
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${sender}-message`;
            
            // Basic Markdown Parsing: Bold (**) and Newlines (\n)
            let formattedText = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
                
            msgDiv.innerHTML = formattedText;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
    </script>

</body>

</html>

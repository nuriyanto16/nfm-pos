version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pos_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-pos_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pos_password}
      POSTGRES_DB: ${DB_NAME:-pos_db}
    ports:
      - "5432:5432"
    volumes:
      - ./database/data:/var/lib/postgresql/data
      - ./database/init_v4.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pos_user -d pos_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pos_backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:-pos_user}
      DB_PASSWORD: ${DB_PASSWORD:-pos_password}
      DB_NAME: ${DB_NAME:-pos_db}
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-supersecretkey_pos_2026}
      PORT: 8080
    volumes:
      - ./backend/uploads:/root/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pos_frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: unless-stopped

  landing-page:
    build:
      context: ./landing-page
      dockerfile: Dockerfile
      args:
        # Override env at build time for Docker deployments
        VITE_API_URL: ${LANDING_API_URL:-http://localhost:8080/api}
        VITE_CHATBOT_URL: ${LANDING_CHATBOT_URL:-http://localhost:5000}
    container_name: pos_landing
    ports:
      - "3000:80"
    depends_on:
      - backend
      - openclaw
    restart: unless-stopped

  openclaw:
    build:
      context: ./openclaw
      dockerfile: Dockerfile
    container_name: pos_openclaw
    restart: unless-stopped
    ports:
      - "5000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - BACKEND_URL=http://host.docker.internal:8080/api/menus
      - PYTHONUNBUFFERED=1
      - CHAT_SECRET=${CHAT_SECRET:-nfm-chat-secret-changeme-2026}
    volumes:
      - ./openclaw:/openclaw/configuration/
      - ./openclaw/logs:/openclaw/configuration/logs

# volumes section removed as no named volumes are being used.
